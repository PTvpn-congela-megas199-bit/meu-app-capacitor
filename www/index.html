<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { background: #0a192f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .card { background: #112240; padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; background: #0a192f; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-entrar { background: #64ffda; color: #0a192f; }
        .btn-google { background: #ffffff; color: #757575; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .divisor { margin: 15px 0; color: #8892b0; font-size: 14px; }
        .toast { position: fixed; top: 20px; right: 20px; background: #ff4757; color: white; padding: 15px; border-radius: 10px; z-index: 1000; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Bem-vindo</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button type="button" class="btn-entrar" id="btnEntrar">Entrar</button>
        
        <div class="divisor">ou</div>

        <button type="button" class="btn-google" id="btnGoogle">
            Entrar com o Google (Configurando...)
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCfMaQ2N5b8KHdAjX11tXVc3kakNQkVhMg",
            authDomain: "base-de-dados-8060d.firebaseapp.com",
            projectId: "base-de-dados-8060d",
            storageBucket: "base-de-dados-8060d.firebasestorage.app",
            messagingSenderId: "91146907783",
            appId: "1:91146907783:web:e7b28d3282152d19184822"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('btnEntrar').onclick = () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            auth.signInWithEmailAndPassword(email, senha)
                .then(() => window.location.href = "home.html")
                .catch(e => alert("Erro: " + e.message));
        };

        // Este botão agora está desativado para o pop-up manual
        document.getElementById('btnGoogle').onclick = () => {
            alert("Atenção: O login Google via Pop-up é bloqueado em Apps. " +
                  "Para usar o Google, instalaremos o Plugin Nativo do Capacitor " +
                  "na próxima etapa de compilação!");
        };
    </script>
</body>
</html>
